# Server
server.port=8080

# Database — uses 'medicare-db' when running in Docker
# uses 'localhost' when running locally
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/medicare?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=MedicareSecretKey2024SuperLongStringForSecurity
jwt.expiration=86400000

# Allow circular references
spring.main.allow-circular-references=true